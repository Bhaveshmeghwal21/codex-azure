name: Build Codex TUI

on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: Build Windows release binary
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            codex-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('codex-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build codex-tui
        working-directory: codex-rs
        run: cargo build --release -p codex-tui

      - name: Upload codex.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-exe
          path: codex-rs/target/release/codex-tui.exe
          if-no-files-found: error
