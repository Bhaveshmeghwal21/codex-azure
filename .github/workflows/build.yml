name: Build Codex CLI

on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: Build Windows release binary
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            codex-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('codex-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build codex CLI
        working-directory: codex-rs
        shell: pwsh
        run: |
          $log = "cargo-build.log"
          $err = "cargo-build.err"
          $process = Start-Process `
            -FilePath cargo `
            -ArgumentList @("build", "--release", "-p", "codex-cli", "--bin", "codex") `
            -NoNewWindow `
            -Wait `
            -PassThru `
            -RedirectStandardOutput $log `
            -RedirectStandardError $err
          $exitCode = $process.ExitCode
          Get-Content $log
          Get-Content $err
          if ($exitCode -ne 0) {
            $tail = Get-Content $err -Tail 180 | Out-String
            $message = $tail `
              -replace '%', '%25' `
              -replace "`r", '%0D' `
              -replace "`n", '%0A'
            Write-Host "::error title=Rust build failed::$message"
            exit $exitCode
          }

      - name: Upload cargo build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-build-log
          path: |
            codex-rs/cargo-build.log
            codex-rs/cargo-build.err
          if-no-files-found: ignore

      - name: Upload codex.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-exe
          path: codex-rs/target/release/codex.exe
          if-no-files-found: error
